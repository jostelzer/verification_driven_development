interface:
  display_name: "Verification-Driven Development (VDD)"
  short_description: "Explicitly invoked verification-first workflow that ships with evidence, not optimism."
  icon_small: "./assets/vdd.png"
  icon_large: "./assets/vdd.png"
  default_prompt: >-
    This skill is explicit opt-in only: use $verification-driven-development
    (VDD) only when the user explicitly asks for VDD,
    $verification-driven-development, or the Verification-Driven Development
    skill by name. Do not invoke it passively because a task involves
    verification, testing, proof, evidence, or runtime checks. When explicitly
    invoked, create one compact joint implementation and verification plan,
    initialize a verification manifest, and record commands, observed signals,
    artifacts when useful, cleanup, and command ownership as the run progresses.
    Keep the process lightweight:
    optimize for believable proof and reproducibility, not ceremony. Use the
    checks that match the real runtime surface instead of forcing named
    profiles. Use discriminating checks that separate H1 from H0, prefer
    show-don't-tell evidence, validate the manifest before the report, stop all
    verification-spawned instances before closeout, and render the final
    certificate inline. Require a concise report with commands, results by
    criterion, evidence, reproducibility, command ownership, cleanup, and final
    state; use optional sections only when they add value. If pictures or
    graphs are produced, embed them inline in the report and final chat response
    with the same local absolute filesystem paths used in the artifact table
    instead of only listing their paths. If a visual artifact is generated
    over SSH, copy it locally before embedding it in chat. Before
    terminal output, self-check against the anti-pattern library.
    If browser behavior matters, require a browser-path signal before VERIFIED.
    Treat SSH as an execution location. If verification cost is high,
    summarize the tradeoff and ask before running the expensive path. If VDD
    tooling fails, switch to failover mode and generate a prefilled GitHub
    issue link plus stack trace evidence before returning BLOCKED.
